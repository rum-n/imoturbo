<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background with gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="128" height="128" rx="20" fill="url(#bgGradient)"/>
  
  <!-- Building shape -->
  <path d="M32 56L64 24L96 56V112H32V56Z" fill="#10B981" opacity="0.95"/>
  
  <!-- Roof accent line -->
  <path d="M64 24L72 36H56L64 24Z" fill="#059669" stroke="#10B981" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Lightning bolt (large turbo element) -->
  <g transform="translate(64, 68)">
    <path d="M0 -32L12 -8L-6 2L8 24L-12 8L0 0Z" fill="#FBBF24" stroke="#FCD34D" stroke-width="1.5" stroke-linejoin="round"/>
    <!-- Lightning glow effect -->
    <path d="M0 -32L12 -8L-6 2L8 24L-12 8L0 0Z" fill="none" stroke="#FCD34D" stroke-width="3" opacity="0.3" stroke-linejoin="round"/>
  </g>
  
  <!-- Windows grid (left column) -->
  <rect x="40" y="48" width="10" height="10" fill="#1F2937" stroke="#0D9488" stroke-width="1"/>
  <rect x="40" y="68" width="10" height="10" fill="#1F2937" stroke="#0D9488" stroke-width="1"/>
  <rect x="40" y="88" width="10" height="10" fill="#1F2937" stroke="#0D9488" stroke-width="1"/>
  
  <!-- Windows grid (right column) -->
  <rect x="78" y="48" width="10" height="10" fill="#1F2937" stroke="#0D9488" stroke-width="1"/>
  <rect x="78" y="68" width="10" height="10" fill="#1F2937" stroke="#0D9488" stroke-width="1"/>
  <rect x="78" y="88" width="10" height="10" fill="#1F2937" stroke="#0D9488" stroke-width="1"/>
  
  <!-- Door -->
  <rect x="56" y="96" width="16" height="16" fill="#059669" stroke="#10B981" stroke-width="1.5"/>
  <circle cx="68" cy="104" r="2" fill="#1F2937" opacity="0.6"/>
  
  <!-- Accent corner elements -->
  <circle cx="32" cy="56" r="3" fill="#FBBF24" opacity="0.6"/>
  <circle cx="96" cy="56" r="3" fill="#FBBF24" opacity="0.6"/>
</svg>
